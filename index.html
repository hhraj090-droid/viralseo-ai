<section class="upload-section">
  <h2>Upload Your Video</h2>

  <div class="upload-box">
    <input type="file" id="videoUpload" accept="video/*">

    <video id="videoPreview" controls style="display:none;width:100%;margin-top:20px;"></video>

    <button onclick="analyzeVideo()">Analyze Video</button>
  </div>

  <div id="result"></div>
</section>

<script>
const upload = document.getElementById("videoUpload");
const preview = document.getElementById("videoPreview");

upload.addEventListener("change", function(){
  const file = this.files[0];

  if(file){
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
  }
});

function analyzeVideo(){
  document.getElementById("result").innerHTML = `
    <h3>AI Analysis Started...</h3>
    <p>Scanning Video...</p>
    <p>Detecting Scenes...</p>
    <p>Generating Transcript...</p>
    <p>Analyzing CTR Potential...</p>
  `;
}
</script>
